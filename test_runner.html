<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PatternDB 修复验证测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .test-panel {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #f0f0f0;
        }
        
        .panel-title {
            font-size: 1.5em;
            color: #333;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-running {
            background: #cce5ff;
            color: #004085;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        #testOutput {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: 2px solid #e9ecef;
        }
        
        .test-line {
            padding: 3px 0;
            border-bottom: 1px solid #eee;
        }
        
        .test-pass {
            color: #28a745;
        }
        
        .test-fail {
            color: #dc3545;
        }
        
        .test-info {
            color: #17a2b8;
        }
        
        .summary-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .summary-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .summary-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        
        .summary-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745 0%, #20c997 100%);
            transition: width 0.5s ease;
            border-radius: 4px;
        }
        
        .details-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        
        .details-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 PatternDB 修复验证测试</h1>
            <p>v2.6.0 - 检测 FLEX3/FLEX2 间隙防守模式修复效果</p>
        </div>

        <div class="test-panel">
            <div class="panel-header">
                <div class="panel-title">自动化测试控制台</div>
                <div id="statusBadge" class="status-badge status-pending">⏳ 等待运行</div>
            </div>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <button id="runTestBtn" onclick="startTests()">
                    ▶️ 运行全部测试
                </button>
                <button onclick="clearOutput()" style="margin-left: 10px; background: #6c757d;">
                    🗑️ 清空输出
                </button>
            </div>

            <div id="testOutput"></div>

            <div id="summarySection" class="summary-card" style="display: none;">
                <div class="summary-item">
                    <div class="summary-label">总测试数</div>
                    <div id="totalTests" class="summary-value">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">✅ 通过</div>
                    <div id="passedTests" class="summary-value" style="color: #28a745;">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">❌ 失败</div>
                    <div id="failedTests" class="summary-value" style="color: #dc3545;">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">通过率</div>
                    <div id="successRate" class="summary-value" style="color: #667eea;">0%</div>
                </div>
            </div>

            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- 加载 PatternDB 和测试脚本 -->
    <script src="web/js/pattern.js"></script>
    <script src="test_pattern_fix.js"></script>
    
    <script>
        const output = document.getElementById('testOutput');
        const statusBadge = document.getElementById('statusBadge');
        const runBtn = document.getElementById('runTestBtn');
        const summarySection = document.getElementById('summarySection');

        function log(message, className = '') {
            const line = document.createElement('div');
            line.className = `test-line ${className}`;
            line.textContent = message;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
            
            // 同时输出到控制台
            console.log(message);
        }

        function clearOutput() {
            output.innerHTML = '';
            summarySection.style.display = 'none';
            statusBadge.className = 'status-badge status-pending';
            statusBadge.textContent = '⏳ 等待运行';
            document.getElementById('progressFill').style.width = '0%';
        }

        async function startTests() {
            clearOutput();
            
            runBtn.disabled = true;
            statusBadge.className = 'status-badge status-running';
            statusBadge.textContent = '🔄 运行中...';
            
            log('🚀 开始执行 PatternDB 修复验证测试...', 'test-info');
            log('='.repeat(60), 'test-info');
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            try {
                const result = runPatternFixTests();
                
                await new Promise(resolve => setTimeout(resolve, 100));
                
                if (result) {
                    showSummary(result);
                    
                    if (result.failed === 0) {
                        statusBadge.className = 'status-badge status-success';
                        statusBadge.textContent = '✅ 全部通过';
                        log('', 'test-info');
                        log('🎉 所有测试通过！PatternDB 修复验证成功！', 'test-pass');
                    } else {
                        statusBadge.className = 'status-badge status-error';
                        statusBadge.textContent = `❌ ${result.failed} 个失败`;
                        log('', 'test-info');
                        log(`⚠️ 存在 ${result.failed} 个失败的测试，请检查上方错误信息`, 'test-fail');
                    }
                    
                    const progress = parseFloat(result.successRate);
                    document.getElementById('progressFill').style.width = `${progress}%`;
                } else {
                    throw new Error('测试函数未返回结果');
                }
            } catch (error) {
                statusBadge.className = 'status-badge status-error';
                statusBadge.textContent = '❌ 执行出错';
                log(`\n❌ 测试执行出错: ${error.message}`, 'test-fail');
                console.error(error);
            }
            
            runBtn.disabled = false;
        }

        function showSummary(result) {
            summarySection.style.display = 'grid';
            document.getElementById('totalTests').textContent = result.total;
            document.getElementById('passedTests').textContent = result.passed;
            document.getElementById('failedTests').textContent = result.failed;
            document.getElementById('successRate').textContent = `${result.successRate}%`;
        }

        window.addEventListener('load', () => {
            log('✅ 测试环境已加载完成', 'test-info');
            log('   - PatternDB 模块: 已就绪', 'test-info');
            log('   - 测试用例: 已加载 (14+ 个)', 'test-info');
            log('', 'test-info');
            log('💡 点击 "运行全部测试" 按钮开始验证...', 'test-info');
        });
    </script>
</body>
</html>
